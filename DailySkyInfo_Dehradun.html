<script>
// ===================== Constants =====================
const LISBON_LAT = 30.3165;
const LISBON_LON = 78.0322;
const DEG = Math.PI / 180;

// Lahiri ayanamsa for the current epoch (degrees).
// Approximate linear model — accurate to <0.01° near present day.
function lahiriAyanamsa(jd) {
  // Ayanamsa was 23°51'11" (~23.853) at J2000 and grows at ~50.29"/yr = 0.013964°/yr
  const yrs = (jd - 2451545.0) / 365.25;
  return 23.853 + 0.013964 * yrs;
}

// Julian Day from a JavaScript Date (UT)
function julianDay(d) {
  let y = d.getUTCFullYear();
  let m = d.getUTCMonth() + 1;
  const day = d.getUTCDate()
    + (d.getUTCHours() + d.getUTCMinutes()/60 + d.getUTCSeconds()/3600) / 24;
  if (m <= 2) { y -= 1; m += 12; }
  const a = Math.floor(y / 100);
  const b = 2 - a + Math.floor(a / 4);
  return Math.floor(365.25 * (y + 4716))
       + Math.floor(30.6001 * (m + 1)) + day + b - 1524.5;
}

function norm360(x) { return ((x % 360) + 360) % 360; }

// ===================== Sun / Moon (tropical) =====================
function sunLonTropical(jd) {
  const n = jd - 2451545.0;
  const L = norm360(280.460 + 0.9856474 * n);
  const g = norm360(357.528 + 0.9856003 * n) * DEG;
  return norm360(L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2*g));
}
function moonLonTropical(jd) {
  const T = (jd - 2451545.0) / 36525.0;
  const Lp = 218.3164477 + 481267.88123421 * T;
  const D  = norm360(297.8501921 + 445267.1114034 * T) * DEG;
  const M  = norm360(357.5291092 + 35999.0502909 * T)  * DEG;
  const Mp = norm360(134.9633964 + 477198.8675055 * T) * DEG;
  const lon = Lp
    + 6.289  * Math.sin(Mp)
    - 1.274  * Math.sin(Mp - 2*D)
    + 0.658  * Math.sin(2*D)
    - 0.186  * Math.sin(M)
    - 0.059  * Math.sin(2*Mp - 2*D)
    - 0.057  * Math.sin(Mp - 2*D + M)
    + 0.053  * Math.sin(Mp + 2*D)
    + 0.046  * Math.sin(2*D - M)
    + 0.041  * Math.sin(Mp - M)
    - 0.035  * Math.sin(D)
    - 0.031  * Math.sin(Mp + M);
  return norm360(lon);
}

function moonPhaseInfo(date) {
  const jd = julianDay(date);
  const elong = norm360(moonLonTropical(jd) - sunLonTropical(jd));
  const illum = (1 - Math.cos(elong * DEG)) / 2 * 100;
  const age = elong / 360 * 29.53058867;
  let name, emoji;
  if (elong < 22.5 || elong >= 337.5) { name="New Moon"; emoji="🌑"; }
  else if (elong < 67.5)              { name="Waxing Crescent"; emoji="🌒"; }
  else if (elong < 112.5)             { name="First Quarter"; emoji="🌓"; }
  else if (elong < 157.5)             { name="Waxing Gibbous"; emoji="🌔"; }
  else if (elong < 202.5)             { name="Full Moon"; emoji="🌕"; }
  else if (elong < 247.5)             { name="Waning Gibbous"; emoji="🌖"; }
  else if (elong < 292.5)             { name="Last Quarter"; emoji="🌗"; }
  else                                { name="Waning Crescent"; emoji="🌘"; }
  return { name, illum, age, emoji, elong };
}

// ===================== Tithi =====================
const TITHI_NAMES = [
  "Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami",
  "Shashthi","Saptami","Ashtami","Navami","Dashami",
  "Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Purnima",
  "Pratipada","Dwitiya","Tritiya","Chaturthi","Panchami",
  "Shashthi","Saptami","Ashtami","Navami","Dashami",
  "Ekadashi","Dwadashi","Trayodashi","Chaturdashi","Amavasya"
];

function tithiInfo(date) {
  const jd = julianDay(date);
  const elong = norm360(moonLonTropical(jd) - sunLonTropical(jd));
  const idx = Math.floor(elong / 12);
  const isShukla = idx < 15;
  return {
    globalIndex: idx + 1,
    name: TITHI_NAMES[idx],
    pakshaShort: isShukla ? "Shukla" : "Krishna",
    paksha: isShukla ? "Shukla (Waxing)" : "Krishna (Waning)",
    isShukla,
    tithiInPaksha: (idx % 15) + 1,
    progress: (elong % 12) / 12 * 100,
  };
}

// ===================== Swara Yoga =====================
const NADI_INFO = {
  "Ida":     { nostril:"Left",  element:"Lunar / Cool",
               good:"Meditation, study, planning, rest, sleep",
               avoid:"Heavy exertion, confrontation", emoji:"🌙" },
  "Pingala": { nostril:"Right", element:"Solar / Warm",
               good:"Exercise, eating, action, debate",
               avoid:"Sleep, meditation", emoji:"☀️" },
  "Sushumna":{ nostril:"Both equal", element:"Balanced / Spiritual",
               good:"Meditation and pranayama ONLY",
               avoid:"Any worldly activity", emoji:"🧘" },
};

function sunriseNadiForTithi(tithiInPaksha, isShukla) {
  const group = Math.floor((tithiInPaksha - 1) / 3);
  if (isShukla) return group % 2 === 0 ? "Ida" : "Pingala";
  return group % 2 === 0 ? "Pingala" : "Ida";
}

function currentNadi(nowLocal, sunriseLocal, sunriseNadi,
                     blockMin = 90, sushumnaWin = 4) {
  let base = sunriseLocal;
  if (nowLocal < sunriseLocal) {
    base = new Date(sunriseLocal.getTime() - 86400000);
  }
  const delta = (nowLocal - base) / 60000; // minutes
  const blk = Math.floor(delta / blockMin);
  const into = delta - blk * blockMin;
  const rem = blockMin - into;
  const nadi = blk % 2 === 0 ? sunriseNadi
                             : (sunriseNadi === "Ida" ? "Pingala" : "Ida");
  return { nadi, into, rem, sushumna: into < sushumnaWin };
}

// ===================== Sunrise / Sunset =====================
function sunriseSunset(dateLocal, lat, lon, tzOffset) {
  // dateLocal: JS Date at local midnight (year/month/day used)
  // tzOffset: hours east of UTC
  const N = Math.floor(
    (Date.UTC(dateLocal.getFullYear(), dateLocal.getMonth(), dateLocal.getDate())
     - Date.UTC(dateLocal.getFullYear(), 0, 0)) / 86400000
  );
  function compute(isSunrise) {
    const zenith = 90.833;
    const lngHour = lon / 15.0;
    const t = N + ((isSunrise ? 6 : 18) - lngHour) / 24;
    const M = 0.9856 * t - 3.289;
    const L = norm360(M + 1.916*Math.sin(M*DEG) + 0.020*Math.sin(2*M*DEG) + 282.634);
    let RA = norm360(Math.atan(0.91764 * Math.tan(L*DEG)) / DEG);
    RA += Math.floor(L/90)*90 - Math.floor(RA/90)*90;
    RA /= 15.0;
    const sinDec = 0.39782 * Math.sin(L * DEG);
    const cosDec = Math.cos(Math.asin(sinDec));
    const cosH = (Math.cos(zenith * DEG) - sinDec * Math.sin(lat*DEG))
               / (cosDec * Math.cos(lat*DEG));
    if (cosH > 1 || cosH < -1) return null;
    let H = isSunrise
      ? 360 - Math.acos(cosH)/DEG
      : Math.acos(cosH)/DEG;
    H /= 15.0;
    const T = H + RA - 0.06571*t - 6.622;
    let UT = T - lngHour;
    UT = ((UT % 24) + 24) % 24;
    return ((UT + tzOffset) % 24 + 24) % 24;
  }
  function toDate(hf) {
    if (hf === null) return null;
    const h = Math.floor(hf);
    const m = Math.floor((hf - h) * 60);
    const s = Math.floor(((hf - h) * 60 - m) * 60);
    const d = new Date(dateLocal);
    d.setHours(h, m, s, 0);
    return d;
  }
  return { sunrise: toDate(compute(true)), sunset: toDate(compute(false)) };
}

// India Standard Time (IST) = UTC+5:30 year-round. India does not observe DST.
function istOffsetHours(dateUTC) {
  return 5.5;
}

// ===================== Brahma Muhurta =====================
function brahmaMuhurta(sunriseLocal) {
  if (!sunriseLocal) return { start: null, end: null };
  return {
    start: new Date(sunriseLocal.getTime() - 96 * 60000),
    end:   new Date(sunriseLocal.getTime() - 48 * 60000),
  };
}

function brahmaStatus(nowLocal, sunriseLocal) {
  const { start, end } = brahmaMuhurta(sunriseLocal);
  if (!start) return { start: null, end: null, status: "unknown" };
  let status;
  if (nowLocal < start) status = "upcoming";
  else if (nowLocal < end) status = "active";
  else status = "passed";
  return { start, end, status };
}

// ===================== Planets (sidereal) =====================
// Meeus-style mean-element formulas for visible planets. Accurate to ~0.1-0.3°
// for Mercury-Saturn in current era — more than enough for sign/house placement.
// All angles in degrees; T = Julian centuries from J2000 TT (~= UT here).

function planetLonTropical(planet, jd) {
  const T = (jd - 2451545.0) / 36525.0;

  if (planet === "Sun")  return sunLonTropical(jd);
  if (planet === "Moon") return moonLonTropical(jd);

  // For outer/inner planets: geocentric ecliptic longitude from heliocentric
  // Keplerian elements.  Elements from J2000 (Meeus Ch.33, truncated terms).
  // L = mean longitude, a = semi-major axis (AU), e = eccentricity,
  // i = inclination, Ω = long. ascending node, ϖ = long. of perihelion.
  const ELEM = {
    Mercury: { L:252.250906 + 149474.0722491*T, a:0.387098310, e:0.20563175,
               i:7.004986, om:48.330893, pi:77.456119 },
    Venus:   { L:181.979801 + 58519.2130302*T,  a:0.723329820, e:0.00677192,
               i:3.394662, om:76.679920, pi:131.563703 },
    Earth:   { L:100.466449 + 35999.3728519*T,  a:1.000001018, e:0.01670862,
               i:0.0,      om:0.0,      pi:102.937348 },
    Mars:    { L:355.433275 + 19141.6964746*T,  a:1.523679342, e:0.09340062,
               i:1.849726, om:49.558093, pi:336.060234 },
    Jupiter: { L:34.351484  + 3036.3027889*T,   a:5.202603191, e:0.04849485,
               i:1.303270, om:100.464441,pi:14.331309 },
    Saturn:  { L:50.077471  + 1223.5110141*T,   a:9.554909596, e:0.05550862,
               i:2.488878, om:113.665524,pi:93.056787 },
  };

  const p = ELEM[planet];
  const e = ELEM.Earth;
  if (!p) return null;

  // Heliocentric position of a planet `el`
  function heliocentric(el) {
    const L = norm360(el.L);
    const M = norm360(L - el.pi);           // mean anomaly
    // Solve Kepler's equation: E - e*sin E = M
    let E = M * DEG;
    for (let k = 0; k < 8; k++) {
      E = E - (E - el.e*Math.sin(E) - M*DEG) / (1 - el.e*Math.cos(E));
    }
    // True anomaly
    const xv = el.a * (Math.cos(E) - el.e);
    const yv = el.a * Math.sqrt(1 - el.e*el.e) * Math.sin(E);
    const v = Math.atan2(yv, xv) / DEG;
    const r = Math.sqrt(xv*xv + yv*yv);
    // Heliocentric ecliptic coords (J2000 ecliptic)
    const u = v + el.pi;  // true longitude in orbital plane from asc. node? actually v + pi = heliocentric ecl. longitude approximation (Meeus)
    const uN = u - el.om; // argument of latitude (approx, for low-inclination use)
    const xh = r * (Math.cos(el.om*DEG) * Math.cos(uN*DEG)
                  - Math.sin(el.om*DEG) * Math.sin(uN*DEG) * Math.cos(el.i*DEG));
    const yh = r * (Math.sin(el.om*DEG) * Math.cos(uN*DEG)
                  + Math.cos(el.om*DEG) * Math.sin(uN*DEG) * Math.cos(el.i*DEG));
    const zh = r * (Math.sin(uN*DEG) * Math.sin(el.i*DEG));
    return { x: xh, y: yh, z: zh };
  }

  const ph = heliocentric(p);
  const eh = heliocentric(e);
  // Geocentric = planet - earth
  const dx = ph.x - eh.x;
  const dy = ph.y - eh.y;
  return norm360(Math.atan2(dy, dx) / DEG);
}

// Mean lunar node (Rahu) — Meeus low-precision formula
function rahuLonTropical(jd) {
  const T = (jd - 2451545.0) / 36525.0;
  // Longitude of ascending node of Moon's orbit (mean)
  const omega = 125.04452 - 1934.136261*T + 0.0020708*T*T + T*T*T/450000;
  return norm360(omega);
}

function siderealLon(planet, jd) {
  const ayan = lahiriAyanamsa(jd);
  let lon;
  if (planet === "Rahu") lon = rahuLonTropical(jd);
  else if (planet === "Ketu") lon = norm360(rahuLonTropical(jd) + 180);
  else lon = planetLonTropical(planet, jd);
  if (lon === null) return null;
  return norm360(lon - ayan);
}

  ["Rahu",    new Date(2025,10,8),  new Date(2028,4,28)],
  ["Jupiter", new Date(2028,4,28),  new Date(2030,8,3)],
  ["Saturn",  new Date(2030,8,3),   new Date(2033,4,13)],
];

// Sade Sati for Libra Moon (sign 6): Saturn in Virgo (5), Libra (6), Scorpio (7)
const SADE_SIGNS = new Set([5, 6, 7]);
const SADE_PHASE = {
  5: "Rising (12th from Moon)",
  6: "Peak (on Moon)",
  7: "Setting (2nd from Moon)",
};

// Future transits relevant for Libra Moon / Pisces Lagna native
const UPCOMING_TRANSITS = [
  [new Date(2026,5,3),   "Jupiter enters Cancer (h10 from Moon, h5 from Lagna)"],
  [new Date(2026,10,1),  "Jupiter enters Leo briefly"],
  [new Date(2027,0,26),  "Jupiter back in Cancer (retrograde)"],
  [new Date(2027,5,5),   "Saturn enters Aries (h2 from Lagna)"],
  [new Date(2027,9,20),  "Saturn back in Pisces (retrograde — over your Lagna)"],
  [new Date(2028,1,25),  "Saturn re-enters Aries (final exit from Lagna)"],
  [new Date(2028,4,28),  "Mercury-Jupiter antardasha begins"],
  [new Date(2030,8,3),   "Mercury-Saturn antardasha begins"],
  [new Date(2033,4,13),  "Ketu Mahadasha begins (17-year Mercury MD ends)"],
  [new Date(2038,9,23),  "Saturn enters Virgo — SADE SATI BEGINS (rising)"],
];

function signIdx(lon) { return Math.floor(lon / 30); }

function currentDasha(now) {
  for (const [lord, s, e] of DASHA_TIMELINE) if (now >= s && now < e) return { lord, s, e };
  return { lord: null, s: null, e: null };
}
function currentAntardasha(now) {
  for (const [lord, s, e] of MERCURY_ANTARDASHAS) if (now >= s && now < e) return { lord, s, e };
  return { lord: null, s: null, e: null };
}

function transitsToday(dateUTC) {
  const jd = julianDay(dateUTC);
  const moonSign = NATAL.Moon.sign;
  const lagnaSign = NATAL.Lagna.sign;
  const out = {};
  for (const pl of ["Sun","Moon","Mars","Mercury","Jupiter","Venus","Saturn","Rahu","Ketu"]) {
    const lon = siderealLon(pl, jd);
    if (lon === null) continue;
    const s = signIdx(lon);
    out[pl] = {
      sign: s,
      name: RASHIS[s],
      deg: lon - s * 30,
      hMoon: ((s - moonSign) % 12 + 12) % 12 + 1,
      hLagna: ((s - lagnaSign) % 12 + 12) % 12 + 1,
    };
  }
  return out;
}

// ===================== Formatting helpers =====================
function pad(n){ return n < 10 ? "0"+n : ""+n; }
function fmtTime(d) {
  if (!d) return "—";
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}
function fmtTimeSec(d) {
  if (!d) return "—";
  return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
}
function fmtDateMY(d) {
  const months = ["Jan","Feb","Mar","Apr","May","Jun",
                  "Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[d.getMonth()] + " " + d.getFullYear();
}
function fmtDateFull(d) {
  const months = ["Jan","Feb","Mar","Apr","May","Jun",
                  "Jul","Aug","Sep","Oct","Nov","Dec"];
  return d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
}

// ===================== Main update =====================
let cached = {};

function updateAll() {
  const nowUTC = new Date();
  const ptOff = istOffsetHours(nowUTC);
  // "Local Dehradun time" simulated as UTC + ptOff. Independent of device tz.
  const lisbonNow = new Date(nowUTC.getTime() + ptOff * 3600 * 1000);
  // Construct a JS "local" date whose getHours() returns Dehradun time.
  // Simplest: treat lisbonNow's UTC fields as if they were local.
  const lNow = new Date(
    lisbonNow.getUTCFullYear(), lisbonNow.getUTCMonth(), lisbonNow.getUTCDate(),
    lisbonNow.getUTCHours(), lisbonNow.getUTCMinutes(), lisbonNow.getUTCSeconds()
  );

  const tzLabel = "Dehradun (IST, UTC+5:30)";

  const mp = moonPhaseInfo(nowUTC);
  const tithi = tithiInfo(nowUTC);

  const lxDate = new Date(lNow.getFullYear(), lNow.getMonth(), lNow.getDate());
  const { sunrise, sunset } = sunriseSunset(lxDate, LISBON_LAT, LISBON_LON, ptOff);

  // Swara
  const sunriseNadi = sunriseNadiForTithi(tithi.tithiInPaksha, tithi.isShukla);
  const swara = sunrise ? currentNadi(lNow, sunrise, sunriseNadi) : null;

  // Vedic
  const transits = transitsToday(nowUTC);
  const md = currentDasha(lNow);
  const ad = currentAntardasha(lNow);

  // ---------- Header date ----------
  const weekdays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  document.getElementById("dateLine").textContent =
    weekdays[lNow.getDay()] + ", " + fmtDateFull(lNow) + " • " + fmtTime(lNow);

  // ---------- Moon card ----------
  document.getElementById("moonEmoji").textContent = mp.emoji;
  document.getElementById("moonPhase").textContent = mp.name;
  document.getElementById("moonStats").textContent =
    `Illuminated: ${mp.illum.toFixed(1)}%  •  Age: ${mp.age.toFixed(1)} days`;

  // ---------- Tithi ----------
  document.getElementById("tithiVal").textContent =
    `${tithi.name}  (${tithi.pakshaShort} ${tithi.tithiInPaksha})\n` +
    `Paksha: ${tithi.paksha}`;

  // ---------- Swara ----------
  if (!swara) {
    document.getElementById("swaraVal").textContent = "Cannot compute (no sunrise today).";
  } else {
    const displayNadi = swara.sushumna ? "Sushumna" : swara.nadi;
    const info = NADI_INFO[displayNadi];
    const hr = Math.floor(swara.rem / 60);
    const mn = Math.floor(swara.rem - hr*60);
    document.getElementById("swaraVal").textContent =
      `${info.emoji} ${displayNadi}  —  ${info.nostril} nostril\n` +
      `${info.element}\n` +
      `Switches in: ${hr}h ${mn}m`;
  }

  // ---------- Vedic ----------
  let vedic = "";
  if (md.lord) {
    vedic += `Dasha: ${md.lord}`;
    if (md.lord === "Mercury" && ad.lord) {
      vedic += `-${ad.lord}  (until ${fmtDateMY(ad.e)})`;
    } else {
      vedic += `  (until ${fmtDateMY(md.e)})`;
    }
    vedic += "\n";
  }
  const sat = transits.Sat || transits.Saturn;
  const jup = transits.Jupiter;
  const moonT = transits.Moon;
  const rahu = transits.Rahu;
  if (sat) {
    const sadeMark = SADE_SIGNS.has(sat.sign) ? "  — SADE SATI" : "";
    vedic += `Saturn: ${sat.name}${sadeMark}\n`;
  }
  if (jup) {
    const mark = jup.hMoon === 1 || jup.hMoon === 5 || jup.hMoon === 9 ? "  ✓"
              : (jup.hMoon === 6 || jup.hMoon === 8 || jup.hMoon === 12 ? "  ⚠" : "");
    vedic += `Jupiter: ${jup.name} (h${jup.hMoon} from Moon)${mark}\n`;
  }
  if (moonT) {
    vedic += `Moon: ${moonT.name} (h${moonT.hMoon})`;
  }
  document.getElementById("vedicVal").textContent = vedic || "—";

  // ---------- Sun ----------
  if (sunrise && sunset) {
    const dl = (sunset - sunrise) / 1000;
    const h = Math.floor(dl / 3600);
    const m = Math.floor((dl % 3600) / 60);
    document.getElementById("sunVal").textContent =
      `Sunrise: ${fmtTime(sunrise)}    Sunset: ${fmtTime(sunset)}\n` +
      `Day length: ${h}h ${m}m`;
  } else {
    document.getElementById("sunVal").textContent = "Sun does not rise/set today.";
  }

  // ---------- Brahma Muhurta ----------
  const bm = brahmaStatus(lNow, sunrise);
  const brahmaCard = document.getElementById("brahmaCard");
  brahmaCard.classList.remove("highlight-active");
  let brahmaText;
  if (!bm.start) {
    brahmaText = "Cannot compute (no sunrise today).";
  } else if (bm.status === "passed") {
    // Show tomorrow's
    const tomorrow = new Date(lxDate.getTime() + 86400000);
    const sr2 = sunriseSunset(tomorrow, LISBON_LAT, LISBON_LON, ptOff).sunrise;
    if (sr2) {
      const bm2 = brahmaMuhurta(sr2);
      const mins = Math.floor((bm2.start - lNow) / 60000);
      const hrs = Math.floor(mins / 60);
      const mn = mins % 60;
      brahmaText = `Tomorrow: ${fmtTime(bm2.start)} – ${fmtTime(bm2.end)}  (48 min)\n` +
                   `Starts in ${hrs}h ${mn}m`;
    } else {
      brahmaText = `Today: ${fmtTime(bm.start)} – ${fmtTime(bm.end)}  (48 min)\nAlready passed`;
    }
  } else if (bm.status === "active") {
    brahmaCard.classList.add("highlight-active");
    const minsLeft = Math.floor((bm.end - lNow) / 60000) + 1;
    brahmaText = `NOW ACTIVE: ${fmtTime(bm.start)} – ${fmtTime(bm.end)}  (48 min)\n` +
                 `🧘 Ends in ~${minsLeft} min`;
  } else { // upcoming
    const mins = Math.floor((bm.start - lNow) / 60000);
    const hrs = Math.floor(mins / 60);
    const mn = mins % 60;
    brahmaText = `Today: ${fmtTime(bm.start)} – ${fmtTime(bm.end)}  (48 min)\n` +
                 `Starts in ${hrs}h ${mn}m`;
  }
  document.getElementById("brahmaVal").textContent = brahmaText;

  // Cache for modals
  cached = { nowUTC, lNow, tzLabel, mp, tithi, sunrise, sunset,
             sunriseNadi, swara, transits, md, ad, bm, ptOff, lxDate };
}

// ===================== Modals =====================
function openModal(which) {
  const titleEl = document.getElementById("modalTitle");
  const bodyEl = document.getElementById("modalBody");
  const c = cached;
  let title = "", body = "";

  if (which === "moon") {
    title = "Moon Details";
    body =
`Phase: ${c.mp.name}
Illuminated: ${c.mp.illum.toFixed(2)}%
Age: ${c.mp.age.toFixed(2)} days (of 29.53)
Elongation from Sun: ${c.mp.elong.toFixed(2)}°

The moon's phase is determined by its angular
distance from the sun. New Moon at 0°, First
Quarter at 90°, Full Moon at 180°, Last Quarter
at 270°.`;

  } else if (which === "tithi") {
    title = "Tithi Details";
    body =
`${c.tithi.name}  (${c.tithi.pakshaShort} ${c.tithi.tithiInPaksha})
Paksha: ${c.tithi.paksha}
Progress through tithi: ${c.tithi.progress.toFixed(1)}%
Global tithi index: ${c.tithi.globalIndex} of 30

A tithi is 1/30 of a lunar month — the time for
the moon to gain 12° on the sun. Tithis vary in
length from ~19 to ~26 hours depending on the
relative speeds of sun and moon.`;

  } else if (which === "swara") {
    title = "Swara Yoga Details";
    if (!c.swara) {
      body = "Cannot compute (no sunrise today).";
    } else {
      const displayNadi = c.swara.sushumna ? "Sushumna" : c.swara.nadi;
      const info = NADI_INFO[displayNadi];
      const hr = Math.floor(c.swara.rem / 60);
      const mn = Math.floor(c.swara.rem - hr * 60);
      body =
`${info.emoji} Current Nadi: ${displayNadi}
Nostril: ${info.nostril}
Element: ${info.element}

Good for: ${info.good}
Avoid: ${info.avoid}

Sunrise Nadi today: ${c.sunriseNadi}
(determined by tithi group: ${c.tithi.pakshaShort} ${c.tithi.tithiInPaksha})

Minutes into current block: ${c.swara.into.toFixed(1)}
Time until switch: ${hr}h ${mn}m

Swara yoga tracks which nostril is dominant —
breath naturally switches approximately every
90 minutes. The brief overlap (Sushumna) is
traditionally considered the most auspicious
time for spiritual practice.`;
    }

  } else if (which === "vedic") {
    title = "Vedic Astrology Details";
    let t = `Natal chart:
  Born: 7 Nov 1961, 04:55 IST, Delhi
  Lagna: Pisces (${NATAL.Lagna.deg.toFixed(2)}°) — Revati pada 4
  Moon:  Libra (${NATAL.Moon.deg.toFixed(2)}°) — Chitra pada 4

`;
    if (c.md.lord) {
      t += `Mahadasha: ${c.md.lord}\n`;
      t += `  ${fmtDateMY(c.md.s)} → ${fmtDateMY(c.md.e)}\n`;
    }
    if (c.ad.lord && c.md.lord === "Mercury") {
      t += `Antardasha: ${c.ad.lord}\n`;
      t += `  ${fmtDateMY(c.ad.s)} → ${fmtDateMY(c.ad.e)}\n`;
    }
    t += "\n";

    if (c.transits.Saturn) {
      const sat = c.transits.Saturn;
      const mark = SADE_SIGNS.has(sat.sign) ? "  ← SADE SATI" : "";
      t += `Sade Sati status:\n`;
      if (SADE_SIGNS.has(sat.sign)) {
        t += `  ACTIVE — ${SADE_PHASE[sat.sign]}${mark}\n\n`;
      } else {
        t += `  Not active (Saturn in ${sat.name})\n\n`;
      }
    }

    t += `TODAY'S TRANSITS (Lahiri sidereal):\n`;
    const planets = ["Sun","Moon","Mars","Mercury","Jupiter",
                     "Venus","Saturn","Rahu","Ketu"];
    for (const p of planets) {
      const x = c.transits[p];
      if (!x) continue;
      t += `  ${p.padEnd(7)} ${x.name.padEnd(12)} ${x.deg.toFixed(2).padStart(5)}°` +
           `  h${x.hMoon} (M)  h${x.hLagna} (L)\n`;
    }
    t += `\n(h = house count from Moon / Lagna, 1-12)\n\n`;

    t += `UPCOMING MAJOR EVENTS:\n`;
    const now = c.lNow;
    let count = 0;
    for (const [d, desc] of UPCOMING_TRANSITS) {
      if (d >= now && count < 5) {
        t += `  ${fmtDateFull(d)}  ${desc}\n`;
        count++;
      }
    }
    body = t;

  } else if (which === "sun") {
    title = "Sunrise & Sunset";
    if (c.sunrise && c.sunset) {
      const dl = (c.sunset - c.sunrise) / 1000;
      const h = Math.floor(dl / 3600);
      const m = Math.floor((dl % 3600) / 60);
      body =
`Sunrise: ${fmtTimeSec(c.sunrise)}
Sunset:  ${fmtTimeSec(c.sunset)}
Day length: ${h}h ${m}m

Location: Dehradun (30.32°N, 78.03°E)
Timezone: ${c.tzLabel}`;
    } else {
      body = "Sun does not rise/set today.";
    }

  } else if (which === "brahma") {
    title = "Brahma Muhurta";
    if (!c.bm.start) {
      body = "Cannot compute (no sunrise today).";
    } else {
      let statusLine;
      if (c.bm.status === "active")   statusLine = "Status: 🧘 ACTIVE RIGHT NOW";
      else if (c.bm.status === "upcoming") statusLine = "Status: Upcoming today";
      else statusLine = "Status: Shown for tomorrow (today's has passed)";

      body =
`Start: ${fmtTimeSec(c.bm.start)}
End:   ${fmtTimeSec(c.bm.end)}
Duration: 48 minutes

${statusLine}
Sunrise reference: ${c.sunrise ? fmtTimeSec(c.sunrise) : "—"}
Timezone: ${c.tzLabel}

————————————————————————————

Brahma Muhurta is the 14th muhurta of the night
— the 48-minute window ending 48 minutes before
sunrise (so sunrise − 96 min to sunrise − 48 min).

Traditionally the most auspicious time for:
  • Meditation and japa
  • Study of sacred texts
  • Pranayama and yoga
  • Setting intentions for the day

The mind is naturally sattvic at this hour —
quiet, clear, and receptive before the rush of
the day begins.`;
    }
  }

  titleEl.textContent = title;
  bodyEl.textContent = body;
  document.getElementById("modalBg").classList.add("show");
}

document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("click", () => openModal(card.dataset.modal));
});
document.getElementById("closeBtn").addEventListener("click", () => {
  document.getElementById("modalBg").classList.remove("show");
});
document.getElementById("modalBg").addEventListener("click", (e) => {
  if (e.target.id === "modalBg")
    document.getElementById("modalBg").classList.remove("show");
});

// Initial + periodic refresh
updateAll();
setInterval(updateAll, 5 * 60 * 1000);   // every 5 min
setInterval(() => {
  // tick header time every minute so it doesn't feel frozen
  if (!document.getElementById("modalBg").classList.contains("show")) {
    updateAll();
  }
}, 60 * 1000);

</script>
